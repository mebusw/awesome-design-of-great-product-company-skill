title: Awesome Design of Great Product Company
description: >-
  Curated design systems of 60+ world-class products — ready to drop into
  your project and feed to any AI coding agent.
theme: minima
logo: false
show_downloads: false
google_analytics:
# Exclude the standalone preview HTML files from Jekyll processing — they are
# self-contained HTML documents, not templates, so we let them pass through.
defaults:
  - scope:
      path: ""
    values:
      layout: default
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .github